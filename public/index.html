<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Meta Information -->
  <title>Tweeter - Home Page</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bungee&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
    integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />


  <!-- App CSS-->
  <link rel="stylesheet" href="/styles/layout.css" type="text/css" />
  <link rel="stylesheet" href="/styles/nav.css" type="text/css" />
  <link rel="stylesheet" href="/styles/header.css" type="text/css" />
  <link rel="stylesheet" href="/styles/new-tweet.css" type="text/css" />
  <link rel="stylesheet" href="/styles/tweet.css" type="text/css" />


  <!-- External JS -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

  <!-- App JS -->
  <script type="text/javascript" src="/scripts/client.js"></script>

</head>

<body>
  <!-- navigation bar-->
  <nav>
    <div class="nav-left">
      <span class="nav-title">tweeter</span>
    </div>
    <div class="nav-right">
      <span class="nav-tweet-btn">Write a new tweet</span>
      <div class="nav-arrow">
        <i class="fas fa-angle-double-down"></i> <!-- font awesome Icon-->
      </div>
    </div>
  </nav>

  <!-- header-->
  <header>
    <div class="header-image"></div> <!-- block for background image-->
    <div class="header-text">
      <h2>Your Name</h2>
    </div>
  </header>

  <!--main container-->
  <main class="container">

    <!-- form section-->
    <section class="new-tweet">
      <h2>Compose Tweet</h2>
      <form action="/tweets" method="POST">
        <label for="tweet-text">What are you humming about?</label>
        <textarea name="text" id="tweet-text" placeholder="What's happening?"></textarea>
        <div>
          <button type="submit">Tweet</button>
          <output name="counter" class="counter" for="tweet-text" aria-live="polite">140</output>
        </div>
      </form>
    </section>

    <!-- tweets section-->
    <section class="tweets-container">
      <!-- tweets will be added here-->
      <h2>Latest Tweets</h2>
      <div id="tweets-list">

        <div class="tweet">
          <header class="tweet-header">
            <div class="tweet-avatar">
              <img src="https://via.placeholder.com/50" alt="User Avatar">
            </div>
            <div class="tweet-user-info">
              <p class="tweet-username">John Doe</p>
              <p class="tweet-handle">@johndoe</p>
            </div>
          </header>
          <main class="tweet-body">
            <p>If I have seen further it is by standing on the shoulders of giants.</p>
          </main>
          <footer class="tweet-footer">
            <span class="tweet-timestamp">10 minutes ago</span>
            <div class="tweet-actions">
              <i class="fas fa-heart"></i>
              <i class="fas fa-retweet"></i>
              <i class="fas fa-reply"></i>
            </div>
          </footer>
        </div>
      </div>
</section>
</main>


<script src="/scripts/composer-char-counter.js"></script>
</body>

</html>
